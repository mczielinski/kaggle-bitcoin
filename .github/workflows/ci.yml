name: CI

# Safety net for dependency/action bumps (e.g. Dependabot): reproduces the
# automation job's environment and confirms the project still installs and the
# data-processing logic still works. The real data fetch/upload is NOT run here
# (needs secrets and has side effects), but install + the offline tests catch
# the common breakages.

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up uv with Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install dependencies (pinned via uv.lock, same as the automation job)
        run: uv sync --locked

      - name: Install test dependencies
        run: uv pip install pytest

      - name: Run tests
        # Dummy Kaggle creds so `import kaggle` can never block on auth in CI.
        env:
          KAGGLE_USERNAME: ci
          KAGGLE_KEY: ci
        run: .venv/bin/python -m pytest -q
