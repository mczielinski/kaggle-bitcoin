version: 2
updates:
  # Python dependencies — uv reads pyproject.toml + uv.lock (grouped into one PR)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      python:
        patterns: ["*"]

  # GitHub Actions used by the Kaggle automation workflow (grouped into one PR)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns: ["*"]
